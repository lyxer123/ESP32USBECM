## 本地组件：假定与本仓库同级克隆 esp-iot-solution（与 ESP32USBECM 在同一父目录下）。
## 例如：.../github/ESP32USBECM 与 .../github/esp-iot-solution
## 若你的路径不同，请改下面各 override_path。
version: 0.1.0
dependencies:
  espressif/iot_usbh_ecm:
    version: "*"
    override_path: ../../esp-iot-solution/components/usb/iot_usbh_ecm
  espressif/iot_eth:
    version: "*"
    override_path: ../../esp-iot-solution/components/iot_eth
  espressif/modem_at:
    version: "*"
    override_path: ../../esp-iot-solution/components/modem_at

  web_wifi:
    version: "*"
    override_path: ../../esp-iot-solution/examples/common_components/web_wifi

  network_test:
    version: "*"
    override_path: ../../esp-iot-solution/examples/common_components/network_test

  cmd_system:
    path: ${IDF_PATH}/examples/system/console/advanced/components/cmd_system
  espressif/iperf-cmd:
    version: "~0.1.1"
  esp-qa/ping-cmd:
    version: "~1.0.0"
